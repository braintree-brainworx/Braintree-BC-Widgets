name: Deploy GitHub Pages

on:
  # Automatically deploy when changes are pushed to main
  push:
    branches:
      - main

  # Allow manual publishing via the GitHub UI or API (agent-triggered)
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual publish"
        required: false
        default: "Manual publish triggered by agent"

# Grant the workflow permission to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel any in-progress run
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
